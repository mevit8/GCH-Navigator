document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

transparent) 0%, transparent 60%),\n            radial-gradient(800px 600px at -5% 105%, color-mix(in oklab, var(--sdsn-blue) 14%, transparent) 0%, transparent 55%),\n            var(--bg);\n}\n\n[data-theme=\"vivid\"] {\n  --bg: #eef4fb;\n  --paper: #ffffff;\n  --paper-2: #ffffff;\n  --ink: #07101e;\n  --ink-2: #2a3a55;\n  --muted: #6c7d96;\n  --rule: #cfdcec;\n  --rule-strong: #93a8c2;\n\n  --sdsn-blue:  #1D76B6;\n  --sdsn-green: #39B54A;\n  --sdsn-navy:  #0F4C75;\n\n  --c-land:  #2EA043;\n  --c-water: #1D76B6;\n  --c-energy:#FF6A00;\n  --c-econ:  #7B2CBF;\n  --c-scen:  #0F4C75;\n  --c-fin:   #FFB300;\n  --c-people:#0F4C75;\n\n  --c-land-soft:  #c9eed2;\n  --c-water-soft: #c8e0f4;\n  --c-energy-soft:#ffd9b8;\n  --c-econ-soft:  #e0ccf5;\n  --c-scen-soft:  #cddeed;\n  --c-fin-soft:   #ffe8a8;\n\n  --acc: var(--sdsn-blue);\n  --brand-grad: linear-gradient(120deg, var(--sdsn-blue) 0%, var(--sdsn-green) 100%);\n  --hub-bg: linear-gradient(180deg, #f4f9ff 0%, #e6efff 100%);\n}\n\n[data-theme=\"navy\"] {\n  --bg: #0c1a2e;\n  --paper: #15263e;\n  --paper-2: #1a2e4a;\n  --ink: #f5f9ff;\n  --ink-2: #c8d4e4;\n  --muted: #8aa0bd;\n  --rule: #2a3e5e;\n  --rule-strong: #4a6385;\n\n  --sdsn-blue:  #4FA3D9;\n  --sdsn-green: #5FD16E;\n  --sdsn-navy:  #0F4C75;\n\n  --c-land:  #5FD16E;\n  --c-water: #4FA3D9;\n  --c-energy:#FFB347;\n  --c-econ:  #B589F0;\n  --c-scen:  #4FA3D9;\n  --c-fin:   #FFD166;\n  --c-people:#c8d4e4;\n\n  --c-land-soft:  #1f3a2a;\n  --c-water-soft: #143247;\n  --c-energy-soft:#3a2a16;\n  --c-econ-soft:  #2a1f44;\n  --c-scen-soft:  #143247;\n  --c-fin-soft:   #3a3014;\n\n  --acc: var(--sdsn-blue);\n  --brand-grad: linear-gradient(120deg, var(--sdsn-blue) 0%, var(--sdsn-green) 100%);\n  --hub-bg: radial-gradient(900px 600px at 90% -5%, rgba(95,209,110,0.10) 0%, transparent 60%),\n            radial-gradient(800px 600px at -5% 105%, rgba(79,163,217,0.12) 0%, transparent 55%),\n            var(--bg);\n\n  --sans: \"Geist\", -apple-system, system-ui, sans-serif;\n  --mono: \"Geist Mono\", ui-monospace, monospace;\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   RESET + BASE\n   ============================================================ */\n*, *::before, *::after { box-sizing: border-box; }\nhtml, body { margin: 0; padding: 0; }\nbody {\n  background: var(--bg);\n  color: var(--ink);\n  font-family: \"Geist\", -apple-system, system-ui, sans-serif;\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n  min-height: 100vh;\n}\na { color: inherit; text-decoration: none; }\nbutton { font: inherit; color: inherit; cursor: pointer; }\n\n/* ============================================================\n   PAGE / VIEW\n   ============================================================ */\n.view { display: none; }\n.view.active { display: block; }\n.page { max-width: 1360px; margin: 0 auto; padding: 40px 28px 80px; }\n<\u002Fstyle>\n<style>/* ============================================================\n   TOP BAR\n   ============================================================ */\n.topbar {\n  position: sticky; top: 0; z-index: 50;\n  border-bottom: 1px solid var(--rule);\n  background: color-mix(in oklab, var(--bg) 80%, transparent);\n  backdrop-filter: blur(10px);\n}\n.topbar-inner {\n  max-width: 1360px; margin: 0 auto;\n  padding: 14px 28px;\n  display: flex; align-items: center; justify-content: space-between; gap: 16px;\n}\n.brand {\n  display: flex; align-items: center; gap: 14px;\n  font-weight: 600; letter-spacing: -0.01em;\n  font-size: 14.5px; color: var(--ink);\n}\n.brand img.gch-mark {\n  height: 36px; width: auto; display: block;\n}\n.brand .pipe { width: 1px; height: 26px; background: var(--rule); }\n.brand .product {\n  display: flex; flex-direction: column; line-height: 1.05;\n}\n.brand .product .nm {\n  font-weight: 600; font-size: 14.5px;\n  letter-spacing: -0.01em; color: var(--ink);\n}\n.brand .product .sub {\n  font-family: \"Geist Mono\", monospace;\n  font-size: 10.5px; font-weight: 400; color: var(--muted);\n  letter-spacing: 0.08em; text-transform: uppercase;\n  margin-top: 3px;\n}\n.top-nav {\n  display: flex; gap: 4px; align-items: center;\n  font-family: \"Geist Mono\", monospace;\n  font-size: 11.5px; letter-spacing: 0.04em;\n}\n.top-nav a {\n  padding: 8px 12px; border-radius: 8px;\n  color: var(--ink-2);\n  transition: background .15s, color .15s;\n}\n.top-nav a:hover { background: var(--paper-2); color: var(--ink); }\n.top-nav a.active {\n  color: var(--ink); background: var(--paper-2);\n  box-shadow: inset 0 0 0 1px var(--rule);\n}\n.theme-switch {\n  display: flex; gap: 0; align-items: center;\n  border: 1px solid var(--rule); border-radius: 999px;\n  padding: 3px; background: var(--paper);\n}\n.theme-switch button {\n  border: none; background: transparent;\n  padding: 5px 10px; border-radius: 999px;\n  font-family: \"Geist Mono\", monospace;\n  font-size: 10.5px; letter-spacing: 0.06em;\n  color: var(--muted);\n}\n.theme-switch button.active {\n  background: var(--ink); color: var(--bg);\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   INTRO CAROUSEL\n   ============================================================ */\n.intro-shell { padding: 24px 28px 64px; max-width: 1360px; margin: 0 auto; }\n.intro-eyebrow {\n  display: flex; align-items: center; gap: 10px;\n  font-family: \"Geist Mono\", monospace;\n  font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;\n  color: var(--muted);\n  margin-bottom: 14px;\n}\n.intro-eyebrow .dot {\n  width: 6px; height: 6px; border-radius: 50%; background: var(--acc);\n  animation: pulse 2.4s ease-in-out infinite;\n}\n@keyframes pulse { 50% { opacity: 0.4; } }\n\n.stage-track {\n  position: relative;\n  border: 1px solid var(--rule);\n  border-radius: 22px;\n  background: var(--paper);\n  overflow: hidden;\n  box-shadow: 0 1px 0 rgba(0,0,0,0.02), 0 30px 60px -40px rgba(0,0,0,0.18);\n}\n.stage-viewport { overflow: hidden; }\n.stage-rail {\n  display: flex;\n  transition: transform .55s cubic-bezier(.6,.05,.2,1);\n  will-change: transform;\n}\n.stage {\n  box-sizing: border-box;\n  flex: 0 0 100%;\n  width: 100%;\n  padding: clamp(28px, 4vw, 52px) clamp(28px, 4.5vw, 60px);\n  min-height: clamp(420px, calc(100vh - 240px), 600px);\n  display: grid;\n  grid-template-columns: 1.1fr 1fr;\n  gap: clamp(24px, 4vw, 52px);\n  align-items: center;\n}\n.stage > .lhs, .stage > .rhs { min-width: 0; }\n.stage .art { max-width: 100%; height: auto; display: block; }\n.stage .rhs > svg { max-width: 100%; max-height: 100%; height: auto; }\n.stage .lhs .num {\n  font-family: \"Geist Mono\", monospace;\n  font-size: 12px; letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: var(--acc);\n  font-weight: 500;\n}\n.stage h2 {\n  font-size: clamp(30px, 3.6vw, 52px);\n  line-height: 0.98; letter-spacing: -0.035em;\n  font-weight: 600;\n  margin: 12px 0 14px;\n  color: var(--ink);\n}\n.stage h2 em {\n  font-style: normal;\n  background: var(--brand-grad);\n  -webkit-background-clip: text; background-clip: text;\n  color: transparent;\n}\n.stage p.lede {\n  font-size: 15px; line-height: 1.55;\n  color: var(--ink-2);\n  max-width: 540px;\n}\n.stage ul.points {\n  list-style: none; padding: 0; margin: 18px 0 0;\n  display: flex; flex-direction: column; gap: 8px;\n}\n.stage ul.points li {\n  padding-left: 22px; position: relative;\n  font-size: 13px; line-height: 1.5; color: var(--ink-2);\n}\n.stage ul.points li::before {\n  content: \"\"; position: absolute; left: 0; top: 8px;\n  width: 12px; height: 1.5px; background: var(--acc);\n}\n\n.stage .rhs {\n  background: var(--paper-2);\n  border: 1px solid var(--rule);\n  border-radius: 16px;\n  min-height: clamp(280px, 50vh, 420px);\n  height: 100%;\n  padding: 24px;\n  display: flex; align-items: center; justify-content: center;\n  position: relative;\n  overflow: hidden;\n}\n.stage .rhs::before {\n  content: \"\";\n  position: absolute; inset: 0;\n  background-image: radial-gradient(circle, rgba(24,23,26,0.08) 1px, transparent 1.4px);\n  background-size: 18px 18px;\n  mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, black 50%, transparent 100%);\n  pointer-events: none;\n}\n\n/* Carousel chrome */\n.stage-chrome {\n  display: flex; align-items: center; justify-content: space-between;\n  padding: 18px 28px;\n  border-top: 1px solid var(--rule);\n  background: var(--paper);\n}\n.dots { display: flex; gap: 8px; }\n.dots button {\n  width: 28px; height: 6px; border-radius: 3px;\n  background: var(--rule); border: none;\n  transition: background .2s, width .25s;\n}\n.dots button.active { background: var(--ink); width: 44px; }\n.nav-btns { display: flex; gap: 8px; }\n.nav-btns button {\n  border: 1px solid var(--rule-strong);\n  background: var(--paper);\n  padding: 10px 16px;\n  border-radius: 999px;\n  font-size: 13px; font-weight: 500;\n  display: inline-flex; align-items: center; gap: 8px;\n  transition: background .15s, border-color .15s, transform .15s;\n}\n.nav-btns button:hover {\n  border-color: var(--ink); background: var(--paper-2);\n  transform: translateY(-1px);\n}\n.nav-btns button.primary {\n  background: var(--ink); color: var(--bg);\n  border-color: var(--ink);\n}\n.nav-btns button.primary:hover {\n  background: color-mix(in oklab, var(--ink), white 15%);\n}\n.nav-btns button:disabled {\n  opacity: 0.4; cursor: not-allowed; transform: none;\n}\n.stage-counter {\n  font-family: \"Geist Mono\", monospace;\n  font-size: 11px; letter-spacing: 0.1em;\n  color: var(--muted);\n}\n.stage-counter b { color: var(--ink); font-weight: 500; }\n\n/* ============================================================\n   INTRO ART  — recreated Figures 2 & 3 as inline SVG\n   ============================================================ */\n.art { width: 100%; height: 100%; max-width: 480px; }\n\n/* art:vision — three rings */\n.ring-vision { display: grid; place-items: center; width: 100%; height: 100%; }\n.ring-vision svg { width: 100%; height: auto; }\n\n/* art:steps — 3-step ladder */\n.ladder { display: flex; flex-direction: column; gap: 14px; width: 100%; padding: 4px; }\n.ladder-step {\n  display: grid;\n  grid-template-columns: 56px 1fr;\n  align-items: center; gap: 16px;\n  padding: 16px 18px;\n  background: var(--paper);\n  border: 1px solid var(--rule);\n  border-radius: 12px;\n  box-shadow: 0 1px 0 rgba(0,0,0,0.02);\n}\n.ladder-step .ln {\n  width: 40px; height: 40px; border-radius: 12px;\n  display: grid; place-items: center;\n  background: color-mix(in oklab, var(--acc) 12%, var(--paper));\n  color: var(--acc);\n  font-family: \"Geist Mono\", monospace;\n  font-weight: 600; font-size: 16px;\n}\n.ladder-step .lt { font-weight: 600; font-size: 15px; line-height: 1.2; }\n.ladder-step .lp { font-size: 12.5px; color: var(--ink-2); margin-top: 2px; }\n.ladder-arrow {\n  height: 14px;\n  background:\n    linear-gradient(to bottom, var(--rule-strong) 0 1px, transparent 1px) center / 1px 14px no-repeat;\n  margin-left: 28px;\n}\n\n\n/* ============================================================\n   STAGE — BANNER VARIANT (full-width image stage)\n   Used for Stage 02 where a wide reference figure is the focus.\n   ============================================================ */\n.stage.stage--banner {\n  grid-template-columns: 1fr;\n  gap: clamp(20px, 2.4vw, 32px);\n  align-items: stretch;\n  text-align: left;\n}\n.stage--banner .banner-head {\n  max-width: 880px;\n}\n.stage--banner .banner-head .num {\n  display: inline-block;\n  font-family: \"Geist Mono\", monospace;\n  font-size: 12px; letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: var(--acc);\n  font-weight: 500;\n  margin-bottom: 6px;\n}\n.stage--banner .banner-head h2 {\n  font-size: clamp(28px, 3.2vw, 44px);\n  line-height: 0.98; letter-spacing: -0.035em;\n  font-weight: 600;\n  margin: 6px 0 12px;\n  color: var(--ink);\n}\n.stage--banner .banner-head h2 em {\n  font-style: normal;\n  background: var(--brand-grad);\n  -webkit-background-clip: text; background-clip: text;\n  color: transparent;\n}\n.stage--banner .banner-head .lede {\n  font-size: 15px; line-height: 1.55;\n  color: var(--ink-2);\n  max-width: 720px;\n}\n.stage--banner .banner-fig {\n  margin: 0;\n  background: var(--paper-2);\n  border: 1px solid var(--rule);\n  border-radius: 16px;\n  padding: clamp(16px, 2vw, 28px);\n  display: flex; align-items: center; justify-content: center;\n  overflow: hidden;\n}\n.stage--banner .banner-fig img {\n  display: block;\n  width: 100%;\n  height: auto;\n  max-height: 56vh;\n  object-fit: contain;\n  border-radius: 8px;\n}\n\n\n/* ============================================================\n   STAGE — STEP VARIANT (text + giant numeral, no chart)\n   Used for Stages 03-05 (Step 01/02/03 deep-dives).\n   ============================================================ */\n.stage.stage--step {\n  /* keep the two-column grid from the base .stage */\n}\n.stage--step .rhs--numeral {\n  background:\n    radial-gradient(ellipse 70% 60% at 50% 50%,\n      color-mix(in oklab, var(--step-color, var(--acc)) 14%, transparent) 0%,\n      transparent 60%),\n    var(--paper-2);\n  position: relative;\n  overflow: hidden;\n}\n.stage--step .rhs--numeral::before {\n  /* keep the dotted scrim from the base .stage .rhs::before */\n}\n.stage--step .step-numeral {\n  position: relative;\n  display: flex; flex-direction: column;\n  align-items: center; justify-content: center;\n  gap: 4px;\n  color: var(--step-color, var(--acc));\n  user-select: none;\n}\n.stage--step .sn-label {\n  font-family: \"Geist Mono\", monospace;\n  font-size: 11px;\n  letter-spacing: 0.32em;\n  text-transform: uppercase;\n  opacity: 0.7;\n}\n.stage--step .sn-digit {\n  font-family: \"Geist\", sans-serif;\n  font-weight: 600;\n  font-size: clamp(140px, 22vw, 240px);\n  line-height: 0.86;\n  letter-spacing: -0.05em;\n  background: linear-gradient(180deg,\n    color-mix(in oklab, var(--step-color, var(--acc)) 100%, transparent) 0%,\n    color-mix(in oklab, var(--step-color, var(--acc)) 55%, transparent) 100%);\n  -webkit-background-clip: text; background-clip: text;\n  color: transparent;\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   HUB — bubble navigator\n   ============================================================ */\n.hub-shell { background: var(--hub-bg); }\n.hub-head {\n  text-align: center; padding: 28px 24px 4px;\n}\n.hub-head h1 {\n  font-size: clamp(32px, 4.2vw, 56px);\n  line-height: 1; letter-spacing: -0.035em;\n  font-weight: 600; margin: 12px 0 10px;\n}\n.hub-head h1 em {\n  font-style: normal;\n  background: var(--brand-grad);\n  -webkit-background-clip: text; background-clip: text; color: transparent;\n}\n.hub-head p {\n  font-size: 15px; line-height: 1.6;\n  color: var(--ink-2);\n  max-width: 620px; margin: 0 auto;\n}\n\n.hub-stage-wrap { position: relative; width: 100%; overflow: hidden; }\n.hub-stage {\n  position: relative;\n  width: 1240px; height: 760px;\n  margin: 0 auto;\n  transform-origin: top left;\n}\n\n.bubble {\n  position: absolute;\n  transform: translate(-50%, -50%);\n  border-radius: 50%;\n  border: 1.5px solid var(--bub-color, var(--ink));\n  background: radial-gradient(circle at 30% 25%,\n                color-mix(in oklab, var(--bub-color) 18%, white) 0%,\n                color-mix(in oklab, var(--bub-color) 8%,  white) 70%,\n                white 100%);\n  color: var(--bub-color, var(--ink));\n  display: grid; grid-template-rows: auto 1fr;\n  padding: 22px 24px;\n  text-align: center;\n  cursor: pointer;\n  transition: transform .35s cubic-bezier(.2,.8,.2,1),\n              box-shadow .35s, border-color .25s;\n  box-shadow: 0 1px 0 rgba(0,0,0,0.04),\n              0 18px 36px -22px color-mix(in oklab, var(--bub-color) 60%, transparent);\n}\n.bubble:hover {\n  transform: translate(-50%, -50%) translateY(-4px) scale(1.03);\n  box-shadow: 0 1px 0 rgba(0,0,0,0.04),\n              0 28px 50px -20px color-mix(in oklab, var(--bub-color) 60%, transparent);\n}\n.bubble .ico {\n  height: 32px; margin-bottom: 6px;\n  display: grid; place-items: center;\n}\n.bubble .ico svg { width: 28px; height: 28px; }\n.bubble .name {\n  font-weight: 700; font-size: 17px;\n  letter-spacing: -0.01em; line-height: 1.05;\n  color: var(--bub-color);\n}\n.bubble .desc {\n  margin-top: 8px;\n  font-weight: 400; font-size: 12px; line-height: 1.4;\n  color: var(--ink-2);\n  max-width: 200px; margin-left: auto; margin-right: auto;\n}\n.bubble .model {\n  margin-top: 10px;\n  display: inline-block;\n  font-family: \"Geist Mono\", monospace;\n  font-size: 10px; letter-spacing: 0.08em;\n  padding: 3px 8px; border-radius: 999px;\n  background: color-mix(in oklab, var(--bub-color) 15%, white);\n  color: var(--bub-color);\n  border: 1px solid color-mix(in oklab, var(--bub-color) 30%, transparent);\n}\n\n/* Variant: pill (top + bottom) */\n.pill {\n  position: absolute;\n  transform: translate(-50%, -50%);\n  border-radius: 18px;\n  border: 1.5px solid var(--bub-color, var(--ink));\n  background: color-mix(in oklab, var(--bub-color) 8%, white);\n  color: var(--bub-color);\n  padding: 18px 26px;\n  cursor: pointer;\n  text-align: left;\n  display: grid; grid-template-columns: auto 1fr; gap: 14px;\n  align-items: center;\n  transition: transform .3s, box-shadow .3s, border-color .25s;\n  box-shadow: 0 14px 30px -22px color-mix(in oklab, var(--bub-color) 50%, transparent);\n  width: 360px;\n}\n.pill:hover {\n  transform: translate(-50%, -50%) translateY(-3px);\n  box-shadow: 0 22px 40px -20px color-mix(in oklab, var(--bub-color) 60%, transparent);\n}\n.pill .ico { width: 36px; height: 36px;\n  border-radius: 10px; display: grid; place-items: center;\n  background: color-mix(in oklab, var(--bub-color) 18%, white);\n}\n.pill .ico svg { width: 22px; height: 22px; color: var(--bub-color); }\n.pill .meta { display: flex; flex-direction: column; }\n.pill .meta .name { font-weight: 700; font-size: 16px; line-height: 1.1; color: var(--bub-color); }\n.pill .meta .desc { font-size: 12.5px; color: var(--ink-2); line-height: 1.35; margin-top: 2px; }\n\n/* Center hub */\n.center-hub {\n  position: absolute;\n  transform: translate(-50%, -50%);\n  width: 180px; height: 180px;\n  border-radius: 50%;\n  background: var(--paper);\n  border: 1.5px dashed var(--rule-strong);\n  display: grid; place-items: center;\n  text-align: center;\n  padding: 18px;\n}\n.center-hub .label {\n  font-family: \"Geist Mono\", monospace;\n  font-size: 10px; letter-spacing: 0.16em;\n  text-transform: uppercase;\n  color: var(--muted);\n  margin-bottom: 6px;\n  display: block;\n}\n.center-hub .name { font-weight: 600; font-size: 14px; line-height: 1.15; color: var(--ink); }\n.center-hub .name em { font-style: normal; color: var(--c-people); }\n.center-hub .desc { font-size: 11px; color: var(--ink-2); margin-top: 6px; line-height: 1.35; }\n\n/* Connection wires */\n.hub-stage svg.wires {\n  position: absolute; inset: 0; width: 100%; height: 100%;\n  pointer-events: none;\n}\n.hub-stage svg.wires path {\n  fill: none;\n  stroke: var(--rule-strong);\n  stroke-width: 1.2;\n  stroke-dasharray: 3 5;\n  opacity: 0.5;\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   MODEL APP PAGE\n   ============================================================ */\n.model-shell { padding: 0; max-width: 1360px; margin: 0 auto; }\n.model-bar {\n  display: flex; align-items: center; justify-content: space-between;\n  padding: 18px 28px;\n  border-bottom: 1px solid var(--rule);\n  background: var(--paper);\n}\n.model-bar .left { display: flex; gap: 14px; align-items: center; }\n.model-bar .left .back {\n  display: inline-flex; align-items: center; gap: 6px;\n  font-family: \"Geist Mono\", monospace; font-size: 12px;\n  color: var(--ink-2);\n  padding: 6px 10px; border-radius: 999px;\n  border: 1px solid var(--rule);\n}\n.model-bar .left .back:hover { background: var(--paper-2); color: var(--ink); }\n.model-bar .left .title {\n  display: flex; align-items: center; gap: 12px;\n  font-weight: 600; font-size: 18px; letter-spacing: -0.01em;\n}\n.model-bar .left .title .swatch {\n  width: 12px; height: 12px; border-radius: 4px;\n  background: var(--acc);\n}\n.model-bar .left .title .code {\n  font-family: \"Geist Mono\", monospace; font-size: 12px;\n  color: var(--muted); font-weight: 400;\n  border-left: 1px solid var(--rule);\n  padding-left: 12px; margin-left: 4px;\n}\n.model-bar .right {\n  display: flex; gap: 8px;\n  font-family: \"Geist Mono\", monospace; font-size: 11.5px;\n  color: var(--muted);\n  align-items: center;\n}\n.model-bar .right .pip {\n  width: 7px; height: 7px; border-radius: 50%;\n  background: var(--c-land); margin-right: 4px;\n  box-shadow: 0 0 8px var(--c-land);\n}\n\n.model-meta {\n  padding: 28px 28px 18px;\n  display: grid; grid-template-columns: 2fr 1fr; gap: 32px;\n  border-bottom: 1px solid var(--rule);\n}\n.model-meta h1 {\n  font-size: clamp(34px, 4vw, 52px);\n  line-height: 1; letter-spacing: -0.035em;\n  font-weight: 500; margin: 0 0 10px;\n}\n.model-meta p {\n  font-size: 15px; line-height: 1.55;\n  color: var(--ink-2); max-width: 620px; margin: 0;\n}\n.model-meta .stats {\n  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;\n  align-self: end;\n}\n.model-meta .stats .stat {\n  background: var(--paper);\n  border: 1px solid var(--rule);\n  border-radius: 10px;\n  padding: 10px 12px;\n}\n.model-meta .stats .stat .label {\n  font-family: \"Geist Mono\", monospace;\n  font-size: 9.5px; letter-spacing: 0.16em; text-transform: uppercase;\n  color: var(--muted);\n}\n.model-meta .stats .stat .value {\n  font-weight: 600; font-size: 16px; margin-top: 4px;\n  letter-spacing: -0.01em;\n}\n\n.iframe-frame {\n  margin: 24px 28px;\n  border: 1px solid var(--rule);\n  border-radius: 14px; overflow: hidden;\n  background: var(--paper);\n  box-shadow: 0 1px 0 rgba(0,0,0,0.02), 0 24px 48px -32px rgba(0,0,0,0.2);\n}\n.iframe-chrome {\n  display: flex; align-items: center; gap: 8px;\n  padding: 10px 14px;\n  border-bottom: 1px solid var(--rule);\n  background: var(--paper-2);\n}\n.iframe-chrome .dots { display: flex; gap: 6px; }\n.iframe-chrome .dots span {\n  width: 10px; height: 10px; border-radius: 50%;\n  background: var(--rule-strong);\n  opacity: 0.6;\n}\n.iframe-chrome .url {\n  flex: 1; font-family: \"Geist Mono\", monospace;\n  font-size: 12px; color: var(--muted);\n  background: var(--paper);\n  padding: 5px 10px; border-radius: 6px;\n  border: 1px solid var(--rule);\n  text-align: center;\n}\n.iframe-placeholder {\n  height: 580px;\n  display: grid; place-items: center;\n  background:\n    repeating-linear-gradient(45deg, transparent 0 12px, color-mix(in oklab, var(--rule) 70%, transparent) 12px 13px);\n  color: var(--muted);\n}\n.iframe-placeholder .badge {\n  background: var(--paper);\n  border: 1px solid var(--rule-strong);\n  border-radius: 12px;\n  padding: 22px 28px;\n  text-align: center;\n  max-width: 420px;\n}\n.iframe-placeholder .badge .label {\n  font-family: \"Geist Mono\", monospace;\n  font-size: 10.5px; letter-spacing: 0.18em; text-transform: uppercase;\n  color: var(--muted);\n}\n.iframe-placeholder .badge .title {\n  margin: 8px 0 6px;\n  font-size: 18px; font-weight: 600; color: var(--ink);\n  letter-spacing: -0.01em;\n}\n.iframe-placeholder .badge .desc {\n  font-size: 13px; line-height: 1.45; color: var(--ink-2);\n}\n.iframe-placeholder .badge .url-stub {\n  margin-top: 12px;\n  display: inline-block;\n  font-family: \"Geist Mono\", monospace;\n  font-size: 11.5px;\n  padding: 5px 10px; border-radius: 6px;\n  background: var(--paper-2); border: 1px solid var(--rule);\n  color: var(--ink-2);\n}\n\n.model-footer {\n  padding: 24px 28px 56px;\n  display: flex; align-items: center; justify-content: space-between;\n  flex-wrap: wrap; gap: 14px;\n  border-top: 1px solid var(--rule);\n  margin-top: 12px;\n}\n.model-footer .related {\n  display: flex; gap: 10px; flex-wrap: wrap;\n}\n.related-chip {\n  padding: 8px 14px;\n  border: 1px solid var(--rule);\n  border-radius: 999px;\n  font-size: 12.5px; color: var(--ink-2);\n  background: var(--paper);\n  transition: background .15s, border-color .15s;\n}\n.related-chip:hover { background: var(--paper-2); color: var(--ink); border-color: var(--ink); }\n.related-chip .swatch {\n  display: inline-block; width: 8px; height: 8px;\n  border-radius: 2px; margin-right: 8px;\n  vertical-align: 0;\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   SITE FOOTER (logos)\n   ============================================================ */\n.site-footer {\n  border-top: 1px solid var(--rule);\n  background: var(--paper);\n  padding: 22px 28px;\n  margin-top: 24px;\n}\n.footer-inner {\n  max-width: 1360px; margin: 0 auto;\n  display: flex; align-items: center; justify-content: space-between;\n  gap: 24px; flex-wrap: wrap;\n}\n.footer-credit {\n  font-family: \"Geist Mono\", monospace;\n  font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;\n  color: var(--muted);\n}\n.footer-logos { display: flex; align-items: center; gap: 22px; }\n.footer-logos img.fl-gch  { height: 38px; width: auto; }\n.footer-logos img.fl-sdsn { height: 30px; width: auto; }\n.footer-logos img.fl-aris { height: 32px; width: auto; }\n.footer-logos .fl-sep { width: 1px; height: 28px; background: var(--rule); }\n[data-theme=\"navy\"] .footer-logos img { filter: brightness(0) invert(1) opacity(0.92); }\n<\u002Fstyle>\n<style>/* ============================================================\n   TWEAKS PANEL\n   ============================================================ */\n.tweaks-panel {\n  position: fixed; right: 20px; bottom: 20px; z-index: 100;\n  width: 300px; max-height: calc(100vh - 40px);\n  background: var(--paper);\n  border: 1px solid var(--rule);\n  border-radius: 14px;\n  box-shadow: 0 24px 48px -16px rgba(0,0,0,0.18), 0 1px 0 rgba(0,0,0,0.04);\n  display: none; flex-direction: column;\n  overflow: hidden;\n  font-family: \"Geist\", sans-serif;\n}\n.tweaks-panel.open { display: flex; }\n.tweaks-head {\n  display: flex; align-items: center; justify-content: space-between;\n  padding: 12px 14px;\n  border-bottom: 1px solid var(--rule);\n  background: var(--paper-2);\n}\n.tweaks-head .ttl {\n  font-family: \"Geist Mono\", monospace;\n  font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;\n  color: var(--ink);\n}\n.tweaks-head button {\n  border: none; background: transparent;\n  width: 24px; height: 24px; border-radius: 6px;\n  color: var(--muted);\n}\n.tweaks-head button:hover { background: var(--rule); color: var(--ink); }\n.tweaks-body {\n  padding: 8px 14px 14px;\n  overflow-y: auto;\n}\n.tweak-row { padding: 10px 0; border-bottom: 1px dashed var(--rule); }\n.tweak-row:last-child { border-bottom: none; }\n.tweak-row .lbl {\n  font-size: 12px; font-weight: 500; color: var(--ink);\n  display: flex; align-items: center; justify-content: space-between;\n  margin-bottom: 6px;\n}\n.tweak-row .lbl .val {\n  font-family: \"Geist Mono\", monospace;\n  font-size: 10.5px; color: var(--muted); font-weight: 400;\n}\n.tweak-radio {\n  display: grid; grid-auto-flow: column; grid-auto-columns: 1fr;\n  gap: 0;\n  border: 1px solid var(--rule); border-radius: 8px; padding: 2px;\n  background: var(--paper-2);\n}\n.tweak-radio button {\n  border: none; background: transparent;\n  padding: 6px 8px; border-radius: 6px;\n  font-family: \"Geist Mono\", monospace;\n  font-size: 10.5px; letter-spacing: 0.06em;\n  color: var(--muted);\n}\n.tweak-radio button.active {\n  background: var(--ink); color: var(--bg);\n}\n.tweak-row input[type=\"range\"] {\n  width: 100%;\n  accent-color: var(--sdsn-blue, var(--ink));\n}\n.tweak-toggle {\n  display: flex; align-items: center; gap: 8px;\n  cursor: pointer;\n}\n.tweak-toggle input { accent-color: var(--sdsn-blue, var(--ink)); }\n.tweak-toggle .t { font-size: 12px; color: var(--ink-2); }\n\n/* ============================================================\n   RESPONSIVE\n   ============================================================ */\n@media (max-width: 960px) {\n  .stage { grid-template-columns: 1fr; padding: 36px 28px; min-height: auto; }\n  .stage .rhs { min-height: 280px; }\n  .model-meta { grid-template-columns: 1fr; }\n  .top-nav .label { display: none; }\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body data-theme=\"sdsn\">\n\n  <!-- ============== TOP BAR ============== -->\n  <header class=\"topbar\">\n    <div class=\"topbar-inner\">\n      <a href=\"#/hub\" class=\"brand\">\n        <img src=\"08abb9f7-7814-41ed-a8da-f27a508b45f1\" alt=\"SDSN Global Climate Hub\" class=\"gch-mark\">\n        <span class=\"pipe\"><\u002Fspan>\n        <span class=\"product\">\n          <span class=\"nm\">Decision Support Navigator<\u002Fspan>\n          <span class=\"sub\">An open platform for systems transformation<\u002Fspan>\n        <\u002Fspan>\n      <\u002Fa>\n      <nav class=\"top-nav\">\n        <a href=\"#/intro\" data-route=\"intro\" class=\"route-link\"><span class=\"label\">Approach<\u002Fspan><\u002Fa>\n        <a href=\"#/hub\" data-route=\"hub\" class=\"route-link\"><span class=\"label\">Models<\u002Fspan><\u002Fa>\n      <\u002Fnav>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ============== INTRO VIEW ============== -->\n  <section class=\"view\" id=\"view-intro\">\n    <div class=\"intro-shell\">\n      <div class=\"intro-eyebrow\">\n        <span class=\"dot\"><\u002Fspan>\n        <span>The GCH approach<\u002Fspan>\n        <span style=\"color:var(--rule-strong);\">/<\u002Fspan>\n        <span>Stages 01 — 05<\u002Fspan>\n      <\u002Fdiv>\n\n      <div class=\"stage-track\">\n        <div class=\"stage-viewport\">\n          <div class=\"stage-rail\" id=\"stageRail\">\n\n            <!-- Stage 1: Vision -->\n            <article class=\"stage\">\n              <div class=\"lhs\">\n                <span class=\"num\">Vision<\u002Fspan>\n                <h2>A <em>Global Commons<\u002Fem> for systems transformation.<\u002Fh2>\n                <p class=\"lede\">An open, accessible digital platform that couples integrated modelling, data infrastructure and stakeholder co-design — to translate systemic evidence into coordinated, country-specific action toward the SDGs.<\u002Fp>\n                <ul class=\"points\">\n                  <li>Convergent crises require systems-level coordination, not sector-by-sector analysis.<\u002Fli>\n                  <li>Entry points and levers should emerge from measurement — not be assumed in advance.<\u002Fli>\n                  <li>Replicable methodology, not a universal prescription.<\u002Fli>\n                <\u002Ful>\n              <\u002Fdiv>\n              <div class=\"rhs\">\n                <!-- Vision art: GCH-as-container holding the three pillars -->\n                <svg class=\"art\" viewBox=\"0 0 400 340\" aria-hidden=\"true\">\n                  <defs>\n                    <linearGradient id=\"gchBg\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"1\">\n                      <stop offset=\"0\" stop-color=\"var(--c-water)\" stop-opacity=\"0.08\"><\u002Fstop>\n                      <stop offset=\"1\" stop-color=\"var(--c-land)\" stop-opacity=\"0.08\"><\u002Fstop>\n                    <\u002FlinearGradient>\n                  <\u002Fdefs>\n\n                  <!-- Outer GCH container -->\n                  <rect x=\"14\" y=\"42\" width=\"372\" height=\"284\" rx=\"22\" fill=\"url(#gchBg)\" stroke=\"var(--ink)\" stroke-width=\"1.5\"><\u002Frect>\n\n                  <!-- GCH label badge straddling the top edge -->\n                  <rect x=\"138\" y=\"22\" width=\"124\" height=\"36\" rx=\"18\" fill=\"var(--ink)\"><\u002Frect>\n                  <text x=\"200\" y=\"38\" text-anchor=\"middle\" font-family=\"Geist Mono\" font-size=\"9\" letter-spacing=\"2\" fill=\"rgba(255,255,255,0.7)\">GLOBAL COMMONS<\u002Ftext>\n                  <text x=\"200\" y=\"52\" text-anchor=\"middle\" font-family=\"Geist\" font-weight=\"600\" font-size=\"13\" fill=\"white\">GCH<\u002Ftext>\n\n                  <!-- Pillar 1: Database, AI-supported -->\n                  <g>\n                    <rect x=\"34\" y=\"80\" width=\"332\" height=\"64\" rx=\"12\" fill=\"var(--paper)\" stroke=\"var(--rule-strong)\" stroke-width=\"1\"><\u002Frect>\n                    <rect x=\"34\" y=\"80\" width=\"6\" height=\"64\" rx=\"3\" fill=\"var(--c-water)\"><\u002Frect>\n                    <circle cx=\"68\" cy=\"112\" r=\"18\" fill=\"var(--c-water-soft)\"><\u002Fcircle>\n                    <g stroke=\"var(--c-water)\" stroke-width=\"1.6\" fill=\"none\" stroke-linecap=\"round\" transform=\"translate(68 112)\">\n                      <ellipse cx=\"0\" cy=\"-6\" rx=\"7\" ry=\"2.4\"><\u002Fellipse>\n                      <path d=\"M-7 -6 L-7 6 a7 2.4 0 0 0 14 0 L7 -6\"><\u002Fpath>\n                      <path d=\"M-7 0 a7 2.4 0 0 0 14 0\"><\u002Fpath>\n                    <\u002Fg>\n                    <text x=\"100\" y=\"107\" font-family=\"Geist\" font-weight=\"600\" font-size=\"14\" fill=\"var(--ink)\">Database<\u002Ftext>\n                    <text x=\"100\" y=\"125\" font-family=\"Geist\" font-size=\"11.5\" fill=\"var(--ink-2)\" textLength=\"258\" lengthAdjust=\"spacingAndGlyphs\">AI-supported · integrated data infrastructure<\u002Ftext>\n                  <\u002Fg>\n\n                  <!-- Pillar 2: Models + Co-design -->\n                  <g>\n                    <rect x=\"34\" y=\"156\" width=\"332\" height=\"64\" rx=\"12\" fill=\"var(--paper)\" stroke=\"var(--rule-strong)\" stroke-width=\"1\"><\u002Frect>\n                    <rect x=\"34\" y=\"156\" width=\"6\" height=\"64\" rx=\"3\" fill=\"var(--c-land)\"><\u002Frect>\n                    <circle cx=\"68\" cy=\"188\" r=\"18\" fill=\"var(--c-land-soft)\"><\u002Fcircle>\n                    <g stroke=\"var(--c-land)\" stroke-width=\"1.6\" fill=\"none\" transform=\"translate(68 188)\">\n                      <circle cx=\"-5\" cy=\"-3\" r=\"4\"><\u002Fcircle>\n                      <circle cx=\"5\" cy=\"-3\" r=\"4\"><\u002Fcircle>\n                      <circle cx=\"0\" cy=\"6\" r=\"4\"><\u002Fcircle>\n                      <line x1=\"-3\" y1=\"-1\" x2=\"3\" y2=\"-1\"><\u002Fline>\n                      <line x1=\"-3\" y1=\"0\" x2=\"-1\" y2=\"4\"><\u002Fline>\n                      <line x1=\"3\" y1=\"0\" x2=\"1\" y2=\"4\"><\u002Fline>\n                    <\u002Fg>\n                    <text x=\"100\" y=\"183\" font-family=\"Geist\" font-weight=\"600\" font-size=\"14\" fill=\"var(--ink)\">Models + Co-design<\u002Ftext>\n                    <text x=\"100\" y=\"201\" font-family=\"Geist\" font-size=\"11.5\" fill=\"var(--ink-2)\" textLength=\"258\" lengthAdjust=\"spacingAndGlyphs\">Coupled modelling chains × stakeholder co-design<\u002Ftext>\n                  <\u002Fg>\n\n                  <!-- Pillar 3: Financing solutions -->\n                  <g>\n                    <rect x=\"34\" y=\"232\" width=\"332\" height=\"64\" rx=\"12\" fill=\"var(--paper)\" stroke=\"var(--rule-strong)\" stroke-width=\"1\"><\u002Frect>\n                    <rect x=\"34\" y=\"232\" width=\"6\" height=\"64\" rx=\"3\" fill=\"var(--c-fin)\"><\u002Frect>\n                    <circle cx=\"68\" cy=\"264\" r=\"18\" fill=\"var(--c-fin-soft)\"><\u002Fcircle>\n                    <g stroke=\"var(--c-fin)\" stroke-width=\"1.6\" fill=\"none\" transform=\"translate(68 264)\">\n                      <circle cx=\"0\" cy=\"0\" r=\"7\"><\u002Fcircle>\n                      <line x1=\"0\" y1=\"-4\" x2=\"0\" y2=\"4\"><\u002Fline>\n                      <line x1=\"-3\" y1=\"-2\" x2=\"3\" y2=\"-2\"><\u002Fline>\n                      <line x1=\"-3\" y1=\"2\" x2=\"3\" y2=\"2\"><\u002Fline>\n                    <\u002Fg>\n                    <text x=\"100\" y=\"259\" font-family=\"Geist\" font-weight=\"600\" font-size=\"14\" fill=\"var(--ink)\">Financing solutions<\u002Ftext>\n                    <text x=\"100\" y=\"277\" font-family=\"Geist\" font-size=\"11.5\" fill=\"var(--ink-2)\" textLength=\"258\" lengthAdjust=\"spacingAndGlyphs\">Sovereign, concessional &amp; blended capital flows<\u002Ftext>\n                  <\u002Fg>\n                <\u002Fsvg>\n              <\u002Fdiv>\n            <\u002Farticle>\n\n            <!-- Stage 2: Three-step approach -->\n            <article class=\"stage stage--banner\">\n              <header class=\"banner-head\">\n                <span class=\"num\">Operational framework<\u002Fspan>\n                <h2>The <em>three-step<\u002Fem> approach.<\u002Fh2>\n                <p class=\"lede\">A practical loop for operationalizing systems transformation — the same three steps run continuously at country, regional and global scales.<\u002Fp>\n              <\u002Fheader>\n              <figure class=\"banner-fig\">\n                <img src=\"017fb20d-a23c-406a-af86-e4d6746f5369\" alt=\"Global Commons 3-Step Approach: Step 1 — understanding and measuring the challenges; Step 2 — pathways for SDGs and national commitments, systems-science modelling, stakeholder co-design; Step 3 — financing transition policies and investment portfolios.\">\n              <\u002Ffigure>\n            <\u002Farticle>\n\n            <!-- Stages 3-5: Step deep-dives (text-only) -->\n            <article class=\"stage stage--step\">\n              <div class=\"lhs\">\n                <span class=\"num\">Step 01<\u002Fspan>\n                <h2>Continuous <em>monitoring &amp; assessment<\u002Fem>.<\u002Fh2>\n                <p class=\"lede\">A living evidence base. Coupled data infrastructures and digital twins that quantify the country-specific feasible space — the binding biophysical, economic and social constraints.<\u002Fp>\n                <ul class=\"points\">\n                  <li>Earth observation × in-situ sensors × administrative data.<\u002Fli>\n                  <li>Indicators tracked at the same granularity as policy is made.<\u002Fli>\n                  <li>Outputs: feasibility envelopes used to calibrate Step 02.<\u002Fli>\n                <\u002Ful>\n              <\u002Fdiv>\n              <div class=\"rhs rhs--numeral\" style=\"--step-color: var(--c-water);\">\n                <div class=\"step-numeral\" aria-hidden=\"true\">\n                  <span class=\"sn-label\">Step<\u002Fspan>\n                  <span class=\"sn-digit\">01<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Farticle>\n\n            <article class=\"stage stage--step\">\n              <div class=\"lhs\">\n                <span class=\"num\">Step 02<\u002Fspan>\n                <h2>Co-designed <em>transformation pathways<\u002Fem>.<\u002Fh2>\n                <p class=\"lede\">Integrated modelling chains coupled with structured stakeholder engagement. Pathway design is an iterative dialogue between models, communities and decision-makers.<\u002Fp>\n                <ul class=\"points\">\n                  <li>WEF nexus: water, energy, food &amp; land coupled with macroeconomy.<\u002Fli>\n                  <li>Beyond-GDP CGE with ecosystem services valuation.<\u002Fli>\n                  <li>Living-lab validation by stakeholders before scenarios go public.<\u002Fli>\n                <\u002Ful>\n              <\u002Fdiv>\n              <div class=\"rhs rhs--numeral\" style=\"--step-color: var(--c-land);\">\n                <div class=\"step-numeral\" aria-hidden=\"true\">\n                  <span class=\"sn-label\">Step<\u002Fspan>\n                  <span class=\"sn-digit\">02<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Farticle>\n\n            <article class=\"stage stage--step\">\n              <div class=\"lhs\">\n                <span class=\"num\">Step 03<\u002Fspan>\n                <h2>Aligned <em>financing &amp; governance<\u002Fem>.<\u002Fh2>\n                <p class=\"lede\">A reformed global financial architecture in which capital flows to country-validated pathways — and where ecosystem services are priced into macroeconomic decisions.<\u002Fp>\n                <ul class=\"points\">\n                  <li>Sovereign &amp; concessional finance aligned to pathway milestones.<\u002Fli>\n                  <li>Ecosystem services valuation embedded in CGE.<\u002Fli>\n                  <li>Transparent accountability to keep transitions on track.<\u002Fli>\n                <\u002Ful>\n              <\u002Fdiv>\n              <div class=\"rhs rhs--numeral\" style=\"--step-color: var(--c-fin);\">\n                <div class=\"step-numeral\" aria-hidden=\"true\">\n                  <span class=\"sn-label\">Step<\u002Fspan>\n                  <span class=\"sn-digit\">03<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Farticle>\n\n                    <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"stage-chrome\">\n          <div class=\"nav-btns\">\n            <button id=\"prevBtn\">← Prev<\u002Fbutton>\n            <button id=\"nextBtn\" class=\"primary\">Next →<\u002Fbutton>\n            <a href=\"#/hub\" class=\"route-link\" style=\"display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border-radius:999px;border:1px solid var(--rule-strong);background:var(--paper);font-size:13px;font-weight:500;\">Skip to models →<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============== HUB VIEW ============== -->\n  <section class=\"view\" id=\"view-hub\">\n    <div class=\"hub-shell\">\n      <div class=\"hub-head\">\n        <div class=\"intro-eyebrow\" style=\"justify-content:center;\">\n          <span class=\"dot\"><\u002Fspan>\n          <span>Decision Support Navigator<\u002Fspan>\n          <span style=\"color:var(--rule-strong);\">/<\u002Fspan>\n          <span>Choose a system<\u002Fspan>\n        <\u002Fdiv>\n        <h1>Explore <em>policy choices<\u002Fem><br>across coupled systems.<\u002Fh1>\n        <p>An open, accessible platform to explore tradeoffs across water, land, energy, economy and finance.\n           Click any system to open its model.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"hub-stage-wrap\" id=\"hubFit\">\n        <div class=\"hub-stage\" id=\"hubStage\">\n\n          <!-- Connection wires (decorative) -->\n          <svg class=\"wires\" viewBox=\"0 0 1240 760\" preserveAspectRatio=\"none\">\n            <!-- center to bubbles -->\n            <path d=\"M 620 380 L 320 240\"><\u002Fpath>\n            <path d=\"M 620 380 L 920 240\"><\u002Fpath>\n            <path d=\"M 620 380 L 320 520\"><\u002Fpath>\n            <path d=\"M 620 380 L 920 520\"><\u002Fpath>\n            <path d=\"M 620 380 L 620 110\"><\u002Fpath>\n            <path d=\"M 620 380 L 620 660\"><\u002Fpath>\n            <!-- bubble cross-links -->\n            <path d=\"M 320 240 L 920 240\"><\u002Fpath>\n            <path d=\"M 320 240 L 320 520\"><\u002Fpath>\n            <path d=\"M 920 240 L 920 520\"><\u002Fpath>\n            <path d=\"M 320 520 L 920 520\"><\u002Fpath>\n          <\u002Fsvg>\n\n          <!-- Top: Scenarios & Goals (pill) -->\n          <a href=\"#/model/scenarios\" target=\"_blank\" rel=\"noopener\" class=\"pill\" style=\"left: 50%; top: 14.5%; --bub-color: var(--c-scen);\">\n            <div class=\"ico\">\n              <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 12l4-7 5 5 4-3 5 8\"><\u002Fpath><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><\u002Fsvg>\n            <\u002Fdiv>\n            <div class=\"meta\">\n              <span class=\"name\">Scenarios &amp; Goals<\u002Fspan>\n              <span class=\"desc\">Climate scenarios, national plans, shared timelines.<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fa>\n\n          <!-- Land & Agri-food -->\n          <a href=\"https://web-production-29d01.up.
