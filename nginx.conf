server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # The app uses client-side hash routing (#/intro, #/hub, #/model/...).
    # Any request that doesn't resolve to a file falls back to the bundled
    # index so the router can pick up the hash on the client.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Compress text-heavy responses.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        font/woff
        font/woff2;

    # Cache static assets aggressively; the HTML itself is revalidated.
    location ~* \.(?:css|js|woff2?|ttf|otf|png|jpg|jpeg|gif|svg|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
        expires 0;
    }

    # Small security headers.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
